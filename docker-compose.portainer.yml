# Portainer production stack — self-contained, no host bind mounts (как finenumbers/geoip).
#
# Portainer → Stacks → Repository → Compose path: docker-compose.portainer.yml
# Образ app: ghcr.io/finenumbers/pstn:latest (публичный GHCR).
# NPM в Docker: Forward pstn_app:5555, сеть proxy — см. docs/npm.md
# POSTGRES_PASSWORD — в Environment variables stack. Pull and redeploy после push в main.

name: pstn

services:
  postgres:
    image: postgres:16-alpine
    container_name: pstn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pstn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pstn}
    volumes:
      - pstn_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pstn} -d ${POSTGRES_DB:-pstn}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pstn_internal

  app:
    image: ghcr.io/finenumbers/pstn:latest
    container_name: pstn_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-5555}:${APP_PORT:-5555}"
    environment:
      PORT: ${APP_PORT:-5555}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-pstn}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-pstn}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_IMPORT_POOL_MAX: ${DB_IMPORT_POOL_MAX:-4}
      EXTERNAL_API_BASE_URL: ${EXTERNAL_API_BASE_URL:-}
      OPR_CSV_PATH: ${OPR_CSV_PATH:-/app/.secrets/opr.csv}
    volumes:
      - pstn_secrets:/app/.secrets
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||5555)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - pstn_internal
      - proxy

networks:
  pstn_internal:
    name: pstn_internal
  proxy:
    external: true
    name: proxy

volumes:
  pstn_pg_data:
    name: pstn_pg_data
  pstn_secrets:
    name: pstn_secrets
