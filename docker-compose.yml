services:
  postgres:
    image: postgres:16-alpine
    container_name: pstn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pstn
      POSTGRES_PASSWORD: pstn
      POSTGRES_DB: pstn
    ports:
      - "5432:5432"
    volumes:
      - pstn_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pstn -d pstn"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pstn_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-5555}:${APP_PORT:-5555}"
    environment:
      PORT: ${APP_PORT:-5555}
      DATABASE_URL: postgresql://pstn:pstn@postgres:5432/pstn
      DB_HOST: postgres
      DB_USER: pstn
      DB_PASS: pstn
      DB_NAME: pstn
      LOG_LEVEL: info
      DB_POOL_MAX: "10"
      DB_IMPORT_POOL_MAX: "4"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pstn_pg_data:
