name: Publish Docker image

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Read app version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          build-args: |
            APP_VERSION=${{ steps.pkg.outputs.version }}
            APP_REVISION=${{ github.event.workflow_run.head_sha || github.sha }}
          tags: |
            ghcr.io/finenumbers/pstn:latest
            ghcr.io/finenumbers/pstn:${{ steps.pkg.outputs.version }}
            ghcr.io/finenumbers/pstn:${{ github.event.workflow_run.head_sha || github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/finenumbers/pstn
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
            org.opencontainers.image.vendor=Finenumbers
